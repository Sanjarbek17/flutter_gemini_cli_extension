# This command converts HTML code into a Flutter ConsumerWidget and places it in a feature-first architecture.
# Usage: /html-to-flutter

description = "Convert HTML code to a Flutter ConsumerWidget and place it in a specific feature."

args = [
  { name = "html_path", description = "The path to the HTML file you want to convert." },
  { name = "query", description = "Any additional instructions or a query for the conversion." }
]

prompt = """
We're going to convert HTML code into a Flutter component within our **feature-first clean architecture**.

## Process
1.  **Analyze the project**: Scan the `lib/features/` directory to identify all existing features and their `presentation/pages/` and `presentation/widgets/` content.
2.  **Available Targets**: Present a list of existing features and the empty files (pages in `pages/` and widgets in `widgets/`) within them that were created by the initial scaffolding.
3.  **Selection**: Ask the user to select the **Feature Name** and the **Target File** (Page or Widget) they want to populate.
4.  **Validation**: Once the user selects, confirm the path by asking: **"You've selected <path_to_file>. Is this it?"**
5.  **Input Source**: Check if `html_path` was provided as an argument. If not, ask the user for the **HTML code snippet** OR for a **file path** to an HTML file they want to convert.
6.  **Query**: Check if `query` was provided as an argument. If not, also ask for any **additional instructions or a query** (e.g., specific widget names, layout preferences, "extract buttons", or any custom design decisions) to refine the conversion.

## Conversion Rules
- Convert the HTML to a Flutter `ConsumerWidget` (Riverpod).
- **Apply Query**: If the user provided specific instructions or a query, ensure the conversion strictly follows them (e.g., "Make the card rounded", "Use AppColors.primary for the header", etc.).
- **Component Extraction**: For complex HTML, identify logical sections (e.g., a custom card, a complex header, or a specialized list item) and extract them into separate widgets within the feature's `presentation/widgets/` directory.
- Use `flutter_screenutil` for all dimensions (e.g., `10.w`, `20.h`, `16.sp`).
- Follow the project's design system:
    - Colors: Use `AppColors` from `lib/app/theme/app_colors.dart`.
    - Text Styles: Use `AppTextStyles` from `lib/app/theme/app_text_styles.dart`.
    - Reusable Widgets: Check `lib/core/widgets/` for existing widgets like `AppButton` or `AppTextField` and use them if they fit.
- Use `Gap` for spacing instead of `SizedBox`.
- Use `CachedNetworkImage` for any network images.
- Ensure the code follows the project's architecture and formatting.

## File Generation
- **Overwrite** the selected target file with the generated code.
- **Create new files** in the `presentation/widgets/` folder if sub-components were extracted.
- Class names should follow the naming convention: `<Name>Page` for files in `pages/` and `<Name>Widget` or specific descriptive names for files in `widgets/` (PascalCase).
- Add all necessary imports:
    - `import 'package:flutter/material.dart';`
    - `import 'package:flutter_riverpod/flutter_riverpod.dart';`
    - `import 'package:flutter_screenutil/flutter_screenutil.dart';`
    - `import 'package:gap/gap.dart';`
    - `import 'package:cached_network_image/cached_network_image.dart';`
    - `import '../../../../app/theme/app_colors.dart';`
    - `import '../../../../app/theme/app_text_styles.dart';`
    - `import '../../../../core/widgets/app_button.dart';` (if used)
    - `import '../../../../core/widgets/app_text_field.dart';` (if used)
    - Import any extracted sub-widgets correctly.

## Context
The project architecture is:
lib/
├── app/
│   └── theme/
├── core/
│   ├── widgets/
│   └── utils/
└── features/
    └── <feature_name>/
        ├── data/
        └── presentation/
            ├── pages/
            └── widgets/

Start by identifying the available features and existing files, then proceed with the selection process.
"""
