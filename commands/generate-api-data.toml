# This command generates real data, models, and providers for a specific page using Dio and Riverpod.
# Usage: /generate-api-data

description = "Generate real data, models, and providers for a specific Flutter page using Dio and Riverpod."

args = [
  { name = "page_path", description = "The path to the Flutter page file (e.g., lib/features/home/presentation/pages/home_page.dart)." },
  { name = "openapi_json_path", description = "The path to the openapi.json file." }
]

prompt = """
We're going to transition from dummy/mock data to **real API data** for a specific page using an **OpenAPI (Swagger) specification**.
**Assumption**: The `/generate-dummy-data` command has already been run, so a basic feature structure (models, mock datasources, repositories, and providers) should already exist.

## Process
1.  **Analyze existing structure & OpenAPI specification**: 
    - Read `page_path` and identify the feature name.
    - Locate existing files in `lib/features/<feature>/`.
    - Explore `openapi_json_path`. Analyze the JSON to find the paths, methods, and schemas relevant to this specific feature.
    - Extract:
        - `operationId` or path names for method naming.
        - Request/Response schemas for model generation.
        - Parameters (Query, Path, Body).
2.  **Compare Models & Suggest Mappings**: 
    - For each endpoint identified, compare the OpenAPI schema with the existing frontend models.
    - If there are naming differences (e.g., backend uses `user_id` but frontend uses `id`), **STOP and ask the user for clarification**.
    - **Suggestion**: Propose similar field names for mapping (e.g., "The backend returns 'user_name', should this map to 'name' in our existing model?").
    - **Wait for user input before proceeding**.
3.  **Model Update (Freezed)**: 
    - Update or create `@freezed` models in `lib/features/<feature>/data/models/` to handle the real API responses based on the OpenAPI schemas.
    - **Crucial**: Every freezed model MUST be defined as an **abstract class** (e.g., `abstract class MyModel with _$MyModel`).
    - Use `@JsonKey(name: 'backend_field_name')` to map backend fields to the existing frontend property names.
    - Ensure `fromJson` and `toJson` are correctly implemented.
4.  **Real Datasource Generation (Retrofit)**:
    - Create or update the **real Retrofit datasource** in `lib/features/<feature>/data/datasources/<feature>_remote_datasource.dart`.
    - **Follow this Template**:
      ```dart
      @RestApi()
      abstract class <Feature>RemoteDatasource {
        factory <Feature>RemoteDatasource(Dio dio, {String baseUrl}) = _<Feature>RemoteDatasource;

        @GET('/endpoint')
        Future<List<Model>> getItems();

        @POST('/endpoint')
        Future<Model> createItem(@Body() Map<String, dynamic> body);

        @PATCH('/endpoint/{id}')
        Future<Model> updateItem(@Path('id') int id, @Body() Map<String, dynamic> body);

        @DELETE('/endpoint/{id}')
        Future<void> deleteItem(@Path('id') int id);
      }
      ```
    - Use the project's standard `Dio` instance (usually provided via a provider).
5.  **Repository Update**:
    - Update the repository in `lib/features/<feature>/data/repositories/<feature>_repository.dart`.
    - Switch from using the `mock_datasource` to the new `remote_datasource`.
    - Ensure the repository methods return the same data types to avoid breaking the presentation layer.
6.  **Provider & Page Verification**:
    - Check the existing Riverpod providers in `presentation/providers/`. Ensure they still work with the updated repository.
    - Verify the page at `page_path` correctly handles the data flow from the real API (including loading and error states).
7.  **Scaffold Missing UI Actions**:
    - If the OpenAPI specification defines actions (e.g., POST for creating, PUT for updating) that are not yet represented by interactive elements on the page:
        - **Propose UI additions**: Suggest adding buttons or menu items for these missing actions.
        - **Generate UI**: Upon confirmation, generate simple UI components (e.g., an `IconButton` or `AppButton`) that trigger these actions.
        - **Dialogs/Forms**: For actions requiring input (like "Create"), generate a simple `showDialog` containing a form with the necessary `AppTextField` widgets based on the OpenAPI schema.

## Rules
- **Prefer Updates**: Always try to update existing models and repositories instead of creating duplicates.
- Use `freezed` and `json_serializable` for models. Ensure models are **abstract classes**.
- Use `riverpod_generator` for providers.
- Use `retrofit` for remote datasources as abstract classes.
- Use `Dio` for network requests.
- **Communication**: Always ask before making assumptions about model differences. Offer mapping suggestions.
- Follow the project's design system and relative import conventions.

